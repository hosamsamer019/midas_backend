<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDAS | Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container"></div>
    
    <div class="main-layout">
        <div class="login-section">
            <div class="login-card">
                <div class="login-header">
                    <p class="welcome-text">Welcome to <span class="brand-text">Midas</span></p>
                    <h2>Login</h2>
                    <p class="description">An intelligent system for analyzing antibiogram data, delivering visual insights to support effective antibiotic selection and combat antimicrobial resistance.</p>
                </div>
                
                <form class="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="sign-in-btn">Login</button>
                </form>
            </div>
        </div>
        
        <div class="brand-section">
            <div class="brand-content">
                <img src="assets/images/logo.png" alt="MIDAS Logo" class="brand-logo">
            </div>
        </div>
    </div>
</body>
</html>
