[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn antibiogram.wsgi:application --bind 0.0.0.0:$PORT"

[build.env]
PYTHON_VERSION = "3.11"

[env]
SECRET_KEY = "${SECRET_KEY}"
DATABASE_URL = "${DATABASE_URL}"
DEBUG = "False"
ALLOWED_HOSTS = "${RAILWAY_STATIC_URL}"
CORS_ALLOWED_ORIGINS = "${CORS_ALLOWED_ORIGINS}"
CSRF_TRUSTED_ORIGINS = "${CSRF_TRUSTED_ORIGINS}"
